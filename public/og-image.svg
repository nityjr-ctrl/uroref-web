<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1d33"/>
      <stop offset="0.5" stop-color="#0f2b46"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.3" r="0.5">
      <stop offset="0" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.85" cy="0.8" r="0.45">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="white-amber" x1="0" y1="0" x2="0.9" y2="0.4">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#fcd34d"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Mark -->
  <g transform="translate(80,90)">
    <rect width="80" height="80" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)"/>
    <path d="M28 24 V46 a12 12 0 0 0 24 0 V24"
          fill="none" stroke="url(#amber)" stroke-width="6" stroke-linecap="round"/>
    <circle cx="40" cy="58" r="3" fill="url(#amber)"/>
  </g>

  <!-- Wordmark -->
  <text x="180" y="148" font-family="Inter, sans-serif" font-weight="800"
        font-size="40" fill="#fcd34d" letter-spacing="-1">UroRef</text>

  <!-- Eyebrow pill -->
  <g transform="translate(80, 230)">
    <rect rx="100" ry="100" width="280" height="40"
          fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.35)"/>
    <circle cx="22" cy="20" r="5" fill="#22c55e"/>
    <text x="40" y="26" font-family="Inter, sans-serif" font-weight="700"
          font-size="13" fill="#4ade80" letter-spacing="2">LIVE — UPDATED DAILY</text>
  </g>

  <!-- Headline -->
  <text x="80" y="360" font-family="Inter, sans-serif" font-weight="800"
        font-size="84" fill="url(#white-amber)" letter-spacing="-3">
    Urology at your
  </text>
  <text x="80" y="450" font-family="Inter, sans-serif" font-weight="800"
        font-size="84" fill="url(#white-amber)" letter-spacing="-3">
    fingertips.
  </text>

  <!-- Subhead -->
  <text x="80" y="510" font-family="Inter, sans-serif" font-weight="400"
        font-size="26" fill="rgba(255,255,255,0.65)">
    Built for the ward, not the library.
  </text>

  <!-- Footer -->
  <text x="80" y="580" font-family="JetBrains Mono, monospace" font-weight="500"
        font-size="18" fill="rgba(255,255,255,0.45)" letter-spacing="1">
    uroref.com  ·  Procedures · Emergencies · Drugs · Calculators · BAUS
  </text>
</svg>
